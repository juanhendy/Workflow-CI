name: Model Retraining and Docker Deployment

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 dagshub pandas scikit-learn
          
      - name: Run MLflow Project Retraining
        id: train_model
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Jalankan training dan tangkap log-nya untuk mengambil Run ID
          mlflow run MLProject --env-manager local -P n_estimators=120 -P max_depth=12 > train_log.txt
          cat train_log.txt
          
          # Mengambil Run ID menggunakan regex dari log mlflow
          RUN_ID=$(str_id=$(grep -oP "with ID '\K[^']+" train_log.txt | head -n 1); echo $str_id)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT

      # --- PROSES ADVANCE: BUILD & PUSH DOCKER HUB ---
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from MLflow Model
        run: |
          mlflow models build-docker -m "runs Kish:/${{ steps.train_model.outputs.RUN_ID }}/model" -n "username_dockerhub_anda/credit-card-model:latest" --enable-mlserver

      - name: Push Docker Image to Docker Hub
        run: |
          docker push username_dockerhub_anda/credit-card-model:latest