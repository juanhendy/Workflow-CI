name: Model Retraining and Docker Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 dagshub pandas scikit-learn numpy

      # ── Kriteria 3: Run menggunakan MLflow Project (mlflow run) ──
      # File MLProject dan conda.yaml di folder MLProject/ digunakan di sini.
      # --env-manager local → pakai env Python saat ini (sesuai conda.yaml).
      - name: Run MLflow Project Retraining
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject \
            --env-manager local \
            -P n_estimators=120 \
            -P max_depth=12

      # ── Skilled/Advance: Simpan model artifact ke GitHub ──
      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model_output/
          retention-days: 30

      # ── Advance: Build & Push Docker Image ke Docker Hub ──
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          mlflow models build-docker \
            -m "model_output" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest" \
            --env-manager local

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest
          echo "Docker image berhasil di-push ke Docker Hub!"
