name: Model Retraining and Docker Deployment

on:
  push:
    branches: [ main ]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 dagshub pandas scikit-learn
          
      - name: Run MLflow Project Retraining
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Tambahkan --env-manager local agar MLflow tidak mencari Conda
          mlflow run MLProject --env-manager local -P n_estimators=120 -P max_depth=12

      # --- PROSES ADVANCE: BUILD & PUSH DOCKER HUB ---
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from MLflow Model
        run: |
          mlflow models build-docker -m "runs:/${{ steps.get_run_id.outputs.RUN_ID }}/model" -n "username_dockerhub_anda/credit-card-model:latest" --enable-mlserver

      - name: Push Docker Image to Docker Hub
        run: |
          docker push username_dockerhub_anda/credit-card-model:latest