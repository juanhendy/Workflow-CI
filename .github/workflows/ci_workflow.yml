name: Model Retraining and Docker Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: ""

      - name: Install MLflow
        run: pip install mlflow==2.19.0 dagshub

      # SYARAT KRITERIA 3: gunakan "mlflow run" bukan "python modelling.py"
      - name: Run MLflow Project Retraining
        id: train_model
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Membangun_model.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject \
            --env-manager conda \
            -P n_estimators=120 \
            -P max_depth=12 \
            2>&1 | tee train_log.txt

          RUN_ID=$(grep -oP "(?<=Run \(ID ')([a-f0-9]+)" train_log.txt | tail -1)
          echo "Ditemukan Run ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT

      # SYARAT SKILLED → ADVANCE: upload model langsung dari mlruns lokal
      # (tidak perlu download dari DagsHub - model sudah ada di runner)
      - name: Find and Upload Model Artifact to GitHub
        run: |
          RUN_ID="${{ steps.train_model.outputs.RUN_ID }}"
          echo "Mencari model untuk Run ID: $RUN_ID"

          # Cari folder model di mlruns lokal
          MODEL_PATH=$(find ./mlruns -type d -name "model" | head -1)

          if [ -z "$MODEL_PATH" ]; then
            echo "mlruns tidak ditemukan, cari di MLProject/"
            MODEL_PATH=$(find . -path "*/artifacts/model" -type d | head -1)
          fi

          echo "Model ditemukan di: $MODEL_PATH"
          mkdir -p ./model_artifact
          cp -r "$MODEL_PATH" ./model_artifact/

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ steps.train_model.outputs.RUN_ID }}
          path: ./model_artifact/
          retention-days: 30

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from MLflow Model
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Membangun_model.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.train_model.outputs.RUN_ID }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest" \
            --env-manager local

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest
          echo "Docker image berhasil di-push ke Docker Hub!"