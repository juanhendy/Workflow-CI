name: Model Retraining and Docker Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          pip install mlflow==2.19.0 dagshub pandas scikit-learn numpy

      - name: Run MLflow Project Retraining
        id: train_model
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Membangun_model.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject \
            --env-manager local \
            -P n_estimators=120 \
            -P max_depth=12 \
            2>&1 | tee train_log.txt

          echo "=== TRAIN LOG ==="
          cat train_log.txt

          echo "=== CARI model_output DI SEMUA LOKASI ==="
          find / -name "model_output" -type d 2>/dev/null || echo "Tidak ditemukan"

          echo "=== ISI WORKSPACE ==="
          ls -la ${{ github.workspace }}/

          echo "=== ISI MLProject/ ==="
          ls -la ${{ github.workspace }}/MLProject/

          RUN_ID=$(grep "TARGET_RUN_ID:" train_log.txt | sed 's/.*TARGET_RUN_ID://' | tr -d '[:space:]' | tail -1)
          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(grep -oP "(?<=Run \(ID ')[a-f0-9]+" train_log.txt | tail -1)
          fi
          echo "Run ID: $RUN_ID"
          [ -z "$RUN_ID" ] && exit 1
          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Copy and Upload Model Artifact
        run: |
          # Cari model_output di mana saja lalu copy ke workspace root
          MODEL_DIR=$(find / -name "model_output" -type d 2>/dev/null | head -1)
          echo "model_output ditemukan di: $MODEL_DIR"

          mkdir -p ${{ github.workspace }}/model_output
          cp -r "$MODEL_DIR/." ${{ github.workspace }}/model_output/
          echo "Isi model_output:"
          ls -la ${{ github.workspace }}/model_output/

      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ steps.train_model.outputs.RUN_ID }}
          path: ${{ github.workspace }}/model_output/
          retention-days: 30

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image from Local Model
        run: |
          mlflow models build-docker \
            -m "${{ github.workspace }}/model_output" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest" \
            --env-manager local

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest
          echo "Docker image berhasil di-push ke Docker Hub!"
