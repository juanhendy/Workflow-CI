name: Model Retraining and Docker Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          activate-environment: ""

      - name: Install MLflow
        run: pip install mlflow==2.19.0 dagshub

      # SYARAT KRITERIA 3: gunakan "mlflow run" bukan "python modelling.py"
      - name: Run MLflow Project Retraining
        id: train_model
        env:
          MLFLOW_TRACKING_URI: https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Membangun_model.mlflow
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          mlflow run MLProject \
            --env-manager conda \
            -P n_estimators=120 \
            -P max_depth=12 \
            2>&1 | tee train_log.txt

          echo "=== ISI TRAIN LOG ==="
          cat train_log.txt

          RUN_ID=$(grep "TARGET_RUN_ID:" train_log.txt | sed 's/.*TARGET_RUN_ID://' | tr -d '[:space:]' | tail -1)

          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(grep -oP "(?<=Run \(ID ')[a-f0-9]+" train_log.txt | tail -1)
          fi

          if [ -z "$RUN_ID" ]; then
            RUN_ID=$(grep -oP "(?<=run_id=)[a-f0-9]+" train_log.txt | tail -1)
          fi

          echo "Ditemukan Run ID: $RUN_ID"

          if [ -z "$RUN_ID" ]; then
            echo "ERROR: RUN_ID tidak ditemukan di log!"
            exit 1
          fi

          echo "RUN_ID=$RUN_ID" >> $GITHUB_OUTPUT

      # SYARAT SKILLED → ADVANCE: upload model dari folder lokal model_output/
      - name: Upload Model Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: trained-model-${{ steps.train_model.outputs.RUN_ID }}
          path: ./model_output/
          retention-days: 30

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker dari model_output/ lokal (bukan runs:/ URI ke DagsHub)
      # Menghindari DagsHub 500 error saat download artifact
      - name: Build Docker Image from Local Model
        run: |
          echo "Building Docker image dari model_output/ lokal..."
          mlflow models build-docker \
            -m "./model_output" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest" \
            --env-manager local

      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/credit-card-model:latest
          echo "Docker image berhasil di-push ke Docker Hub!"
