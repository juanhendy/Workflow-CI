name: MLflow Project CI

on:
  push:
    paths:
      - 'MLProject_Folder/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          pip install mlflow dagshub pandas scikit-learn

      - name: Run MLflow Project
        env:
          DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          # Menjalankan project dari folder
          mlflow run MLProject_Folder/ -P n_estimators=150

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          # Catatan: Untuk real-world, kita butuh Run ID dari MLflow. 
          # Untuk submission, Anda bisa buat Dockerfile sederhana atau menggunakan mlflow models build-docker
          docker build -t ${{ secrets.DOCKER_USERNAME }}/credit-card-model:latest MLProject_Folder/
          docker push ${{ secrets.DOCKER_USERNAME }}/credit-card-model:latest